name: Checks

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  general:
    name: General Checks
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Release local.properties file
        run: cp local.defaults.properties local.properties

      - name: Run Checks
        run: ./gradlew check

      - name: Upload SARIF Report (app)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: ${{ !cancelled() && hashFiles('app/build/reports/*.sarif') != '' }}  # run this step even if previous step failed
        with:
          sarif_file: app/build/reports/

      - name: Upload SARIF Report (core)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: ${{ !cancelled() && hashFiles('core/build/reports/*.sarif') != '' }}  # run this step even if previous step failed
        with:
          sarif_file: core/build/reports/

      - name: Upload Check Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}  # run this step even if previous step failed
        with:
          name: check-results
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results-*.html
