name: connectedAndroidTest

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Run Connected Android Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 24, '36.0' ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Release local.properties file
        run: cp local.defaults.properties local.properties

      # android-emulater-runner configurations start here
      # See also https://github.com/ReactiveCircus/android-emulator-runner#usage--examples
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD and Generate Snapshot for Caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run UI Tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Disable auto-rotation and lock device to landscape
            adb shell settings put system accelerometer_rotation 0
            # Lock device to portrait
            adb shell settings put system user_rotation 0
            
            ./gradlew connectedCheck
            
            mkdir -p app/build/reports/portrait-tests
            cp -r app/build/reports/androidTests/connected/* app/build/reports/portrait-tests/ || true
            
            # Lock device to landscape
            adb shell settings put system user_rotation 1
            
            ./gradlew connectedCheck
            
            mkdir -p app/build/reports/landscape-tests
            cp -r app/build/reports/androidTests/connected/* app/build/reports/landscape-tests/ || true

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}  # run this step even if previous step failed
        with:
          name: test-results
          path: |
            **/build/reports/portrait-tests
            **/build/reports/landscape-tests
